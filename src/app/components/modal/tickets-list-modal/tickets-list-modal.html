<ion-header mode="md">
  <ion-toolbar>
    <div class="p-4 flex items-center justify-between">
      <div class="heading-h3 neutral-01">Tickets & Admission</div>
      <i class="pi pi-times cursor-pointer text-xl" (click)="close()"></i>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content mode="md">
  <div class="p-4">
    @for (ticket of tickets; track ticket.id || $index) {
      <ticket-card [ticket]="ticket" [compact]="true" />
    }

    <!-- Subscription Plans: use subscription-card -->
    @if (plans && plans.length > 0) {
      <div class="mt-6">
        <div class="heading-h4 neutral-01 mb-3 font-semibold">Subscription Plans</div>
        @for (plan of plans; track plan.id || $index) {
          <div class="mb-3">
            <app-subscription-card [data]="toSubscriptionData(plan)" mode="select" />
          </div>
        }
      </div>
    }
  </div>
</ion-content>

<ion-header mode="md">
  <ion-toolbar mode="md">
    <div class="p-4 text-center heading-h4 neutral-01">Add to Calendar</div>
  </ion-toolbar>
</ion-header>
<div class="inner-content">
  <div class="p-6 flex flex-col text-center">
    <!-- Event title -->
    <div class="heading-h2 neutral-01">
      {{ eventData?.title }}
    </div>

    <!-- Date & time -->
    <div class="body-14M neutral-04">
      {{ eventData?.formattedDateTime }}
    </div>

    <!-- Action buttons -->
    <div class="flex flex-col gap-3 mt-6">
      <app-button
        label="Add to Google Calendar"
        [color]="isNative ? 'secondary' : 'primary'"
        (click)="addToGoogleCalendar()"
        ionIconName="logo-google"
      />

      @if (isNative) {
        <app-button label=" Add to Calendar" (click)="iosCreateEvent()" ionIconName="calendar" />
      }
    </div>
  </div>
</div>
